artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a fixed-format access log at /app/access.log and compute three summary statistics: total request count, count of distinct client IPs, and the most-requested path. Requires correctly extracting the method/path from the quoted request field and aggregating across lines."
solution_explanation = "Iterate over each non-blank line: increment a request counter, add the leading IP to a set, and regex out the path from the quoted request field into a Counter. Write total_requests, unique_ips, and top_path (the Counter's most common entry) to /app/report.json."
verification_explanation = "The verifier checks /app/report.json exists, is a JSON object with the required keys, and that each value (total_requests, unique_ips, top_path) equals the true value for the fixed access.log shipped in the image -- not just that the file exists."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
network_mode = "no-network"
mcp_servers = []
